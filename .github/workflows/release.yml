name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest        # GitHub's M-series runner
            archive: med-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest        # Cross-compile x86_64 from M-series runner
            archive: med-x86_64-apple-darwin.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: med-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm   # Native ARM64 runner — no cross-compilation needed
            archive: med-aarch64-unknown-linux-gnu.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      # ort-download-binaries statically links ORT at build time, producing a
      # self-contained binary.  This works on GitHub runners (full OS SDK
      # available) even though it fails in Nix (missing SDK stubs).
      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --no-default-features --features ort-download-binaries
        env:
          # Silence the ORT build-time download progress spam
          ORT_STRATEGY: download

      - name: Package
        run: |
          tar -czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release med

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
