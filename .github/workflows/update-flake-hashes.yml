name: Update Flake Hashes

# Runs after a release is published (i.e. after all build artifacts are uploaded).
on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: cachix/install-nix-action@v30

      - name: Update flake hashes
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          bash scripts/update-flake-hashes.sh "${VERSION#v}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git diff --staged --quiet || git commit -m "chore: update flake hashes for ${{ github.event.release.tag_name }}"
          git push
